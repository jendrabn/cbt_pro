{% extends "layouts/base_auth.html" %}

{% block title %}Reset Password Selesai{% endblock %}

{% block content %}
<main class="login-shell d-flex align-items-center justify-content-center p-3 p-md-4">
    <section class="login-card p-4 p-md-5 text-center">
        <header class="mb-3">
            <h1 class="h4 fw-bold mb-2">Password Berhasil Diubah</h1>
            <p class="text-muted mb-0">Password baru Anda sudah aktif. Silakan masuk kembali.</p>
        </header>
        <div class="mt-3">
            <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Kembali ke Login</a>
        </div>
    </section>
</main>
{% endblock %}
