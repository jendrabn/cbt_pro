{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="application-name" content="{{ branding.institution_name|default:'Sistem CBT' }}">
    <meta name="theme-color" content="{{ branding.primary_color|default:'#0d6efd' }}">
    <title>{% block title %}Masuk - {{ branding.institution_name|default:"CBT Pro" }}{% endblock %}</title>
    <link rel="icon" href="{{ branding.institution_favicon_url|default:'/static/images/favicon.ico' }}">
    <style>
        :root {
            --login-bg: #f3f7fb;
            --login-primary: {{ branding.primary_color|default:"#0d6efd" }};
            --login-card: #ffffff;
            --login-border: #d9e3ee;
            --login-text: #0f2038;
            --login-muted: #5f6f82;
            --login-background:
                {% if branding.login_page_background_url %}
                linear-gradient(rgba(12, 25, 44, 0.55), rgba(12, 25, 44, 0.55)),
                url('{{ branding.login_page_background_url }}') center/cover no-repeat fixed;
                {% else %}
                radial-gradient(circle at 10% 10%, #e0ecff, transparent 28%),
                radial-gradient(circle at 88% 20%, #d7f5f0, transparent 24%),
                var(--login-bg);
                {% endif %}
        }
    </style>
    <link href="{% static 'css/custom.css' %}?v={{ asset_version }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="login-page{% block body_classes %}{% endblock %}">
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            'use strict';
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.forEach(function(tooltipTriggerEl) {
                new bootstrap.Tooltip(tooltipTriggerEl, {
                    trigger: 'hover focus',
                    boundary: 'viewport'
                });
            });
        })();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    {% block vendor_js %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
