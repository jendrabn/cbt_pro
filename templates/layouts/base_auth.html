{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Masuk - {{ branding.institution_name|default:"Sistem CBT" }}{% endblock %}</title>
    <link rel="icon" href="{{ branding.institution_favicon_url|default:'/static/images/favicon.ico' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --login-bg: #f3f7fb;
            --login-primary: {{ branding.primary_color|default:"#0d6efd" }};
            --login-card: #ffffff;
            --login-border: #d9e3ee;
            --login-text: #0f2038;
            --login-muted: #5f6f82;
            --login-background:
                {% if branding.login_page_background_url %}
                linear-gradient(rgba(12, 25, 44, 0.55), rgba(12, 25, 44, 0.55)),
                url('{{ branding.login_page_background_url }}') center/cover no-repeat fixed;
                {% else %}
                radial-gradient(circle at 10% 10%, #e0ecff, transparent 28%),
                radial-gradient(circle at 88% 20%, #d7f5f0, transparent 24%),
                var(--login-bg);
                {% endif %}
        }
    </style>
    <link href="{% static 'css/main.css' %}?v={{ asset_version }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="login-page{% block body_classes %}{% endblock %}">
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    {% block vendor_js %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
