{% extends "base.html" %}
{% load static %}

{% block body %}
<header style="padding:12px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;">
    <img src="{{ branding.institution_logo_url|default:'/static/images/logo.png' }}" alt="Logo" style="width:32px;height:32px;object-fit:contain;" onerror="this.onerror=null;this.src='{% static 'images/logo.png' %}';">
    <strong>{{ branding.institution_name|default:"Sistem CBT" }} - Student</strong>
</header>
<main>
    {% block content %}{% endblock %}
</main>
{% endblock %}
