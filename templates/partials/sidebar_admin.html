{% load cbt_extras static %}
<aside class="cbt-sidebar">
    <div class="cbt-sidebar-header">
        {% with sidebar_logo=branding.institution_logo_dark_url|default:branding.institution_logo_url|default:'/static/images/logo-light.png' %}
        <img
            src="{{ sidebar_logo }}"
            alt="{{ branding.institution_name|default:'Logo Institusi' }}"
            class="cbt-sidebar-brand-image"
            onerror="this.onerror=null;this.src='{% static 'images/logo-light.png' %}';"
        >
        {% endwith %}
    </div>
    <nav class="cbt-sidebar-nav" aria-label="Sidebar navigation">
        <a class="cbt-sidebar-link {% cbt_active 'admin_dashboard' %}" href="/admin/dashboard/">
            <i class="ri-dashboard-line" aria-hidden="true"></i>
            <span>Dashboard</span>
        </a>
        <a class="cbt-sidebar-link {% cbt_active 'user_list' 'user_create' 'user_detail' 'user_edit' 'user_import' 'user_import_report' 'user_import_template' %}" href="/admin/users/">
            <i class="ri-group-line" aria-hidden="true"></i>
            <span>Pengguna</span>
        </a>
        <a class="cbt-sidebar-link {% cbt_active 'subject_list' 'subject_create' 'subject_edit' 'subject_delete' %}" href="/admin/subjects/">
            <i class="ri-book-open-line" aria-hidden="true"></i>
            <span>Mata Pelajaran</span>
        </a>
        <a class="cbt-sidebar-link {% cbt_active 'admin_analytics' 'system_reports' 'export_analytics' %}" href="/admin/analytics/">
            <i class="ri-bar-chart-box-line" aria-hidden="true"></i>
            <span>Analitik</span>
        </a>
        <a class="cbt-sidebar-link {% cbt_active 'system_settings' 'system_settings_backup_download' %}" href="/admin/settings/">
            <i class="ri-settings-3-line" aria-hidden="true"></i>
            <span>Pengaturan</span>
        </a>
    </nav>
</aside>
